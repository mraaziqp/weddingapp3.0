# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1

env:
  - variable: ADMIN_ACCESS_KEY
    value: razia-abdu-2026
  # SUPABASE_SERVICE_ROLE_KEY is stored in Google Cloud Secret Manager.
  # Run once to create the secret:
  #   gcloud secrets create supabase-service-role-key --data-file=- (then paste the key)
  # OR use Firebase Console > App Hosting > your backend > Environment variables > Add.
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: supabase-service-role-key
